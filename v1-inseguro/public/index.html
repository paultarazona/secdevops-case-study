<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SecDevOps Lab - V1</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <a class="skip-link" href="#main-content" data-i18n="skip_link">Skip to lesson</a>
    <header class="topbar">
      <a href="#challenge/sql-injection" class="brand">SecDevOps Lab <span>V1</span></a>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <p data-i18n="topbar_subtitle">Local learning environment only</p>
        <div class="lang-switch" style="display: flex; gap: 0.4rem;">
          <button id="lang-es" class="secondary" style="min-height: 28px; padding: 0.1rem 0.5rem; font-size: 0.75rem; border-radius: 4px;">ES</button>
          <button id="lang-en" class="secondary" style="min-height: 28px; padding: 0.1rem 0.5rem; font-size: 0.75rem; border-radius: 4px;">EN</button>
        </div>
      </div>
    </header>
    <div class="app-shell">
      <aside class="sidebar" data-i18n-aria-label="challenge_catalog" aria-label="Challenge catalog">
        <div class="sidebar-heading">
          <p class="section-label" data-i18n="learning_route">Learning route</p>
          <strong id="progress-summary" data-i18n="progress_summary_initial">0 verified</strong>
        </div>
        <ol id="challenge-list" class="challenge-list"></ol>
      </aside>
      <main id="main-content" class="content">
        <section id="lesson-panel" class="panel lesson-panel" tabindex="-1" aria-live="polite"></section>
        <p id="status" class="status" role="status" aria-live="polite"></p>
        <section id="auth-section" class="panel auth-panel" aria-labelledby="auth-title">
          <div class="panel-heading">
            <p class="section-label" data-i18n="lab_access">Lab access</p>
            <h2 id="auth-title" data-i18n="sign_in_title">Sign in to the resource workspace</h2>
          </div>
          <form id="auth-form" class="form-grid">
            <label><span data-i18n="username">Username</span><input id="username" name="username" autocomplete="username" required></label>
            <label><span data-i18n="password">Password</span><input id="password" name="password" type="password" autocomplete="current-password" required></label>
            <div class="form-actions">
              <button type="submit" name="action" value="login" data-i18n="sign_in_btn">Sign in</button>
              <button type="submit" name="action" value="register" class="secondary" data-i18n="create_account_btn">Create account</button>
            </div>
          </form>
        </section>
        <section id="workspace" hidden>
          <div class="workspace-bar">
            <div>
              <p class="section-label" data-i18n="active_session">Active session</p>
              <strong id="current-user"></strong>
            </div>
            <button id="logout" class="secondary" data-i18n="sign_out_btn">Sign out</button>
          </div>
          <div class="workspace-grid">
            <section class="panel">
              <div class="panel-heading">
                <p class="section-label" data-i18n="write">Write</p>
                <h2 id="resource-form-title" data-i18n="create_resource_title">Create a resource</h2>
              </div>
              <form id="resource-form" class="stacked-form">
                <label><span data-i18n="title">Title</span><input id="resource-title" name="title" maxlength="120" required></label>
                <label><span data-i18n="content_label">Content</span><textarea id="resource-content" name="content" rows="7" maxlength="5000"></textarea></label>
                <div class="form-actions">
                  <button id="resource-submit" type="submit" data-i18n="save_resource_btn">Save resource</button>
                  <button id="cancel-edit" type="button" class="secondary" data-i18n="cancel_edit_btn" hidden>Cancel edit</button>
                </div>
              </form>
            </section>
            <section class="panel">
              <div class="panel-heading panel-heading-row">
                <div>
                  <p class="section-label" data-i18n="read">Read</p>
                  <h2 data-i18n="your_resources_title">Your resources</h2>
                </div>
                <button id="refresh-resources" class="secondary" data-i18n="refresh_btn">Refresh</button>
              </div>
              <div id="resource-list" class="resource-list" aria-live="polite"></div>
            </section>
          </div>
        </section>
      </main>
    </div>
    <script src="/lab/catalog.js"></script>
    <script src="/lab/shell.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
