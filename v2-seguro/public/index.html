<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SecDevOps Lab - V2</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to lesson</a>
    <header class="topbar"><a href="#challenge/sql-injection" class="brand">SecDevOps Lab <span>V2</span></a><p>Hardened comparison environment</p></header>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Challenge catalog"><div class="sidebar-heading"><p class="section-label">Learning route</p><strong id="progress-summary">0 verified</strong></div><ol id="challenge-list" class="challenge-list"></ol></aside>
      <main id="main-content" class="content">
      <section id="lesson-panel" class="panel lesson-panel" tabindex="-1" aria-live="polite"></section>
      <p id="status" class="status" role="status" aria-live="polite"></p>
      <section id="auth-section" class="panel auth-panel" aria-labelledby="auth-title">
        <div class="panel-heading">
          <p class="section-label">Lab access</p>
          <h2 id="auth-title">Enter the workspace</h2>
        </div>
        <form id="auth-form" class="form-grid">
          <label>Username<input id="username" name="username" autocomplete="username" required></label>
          <label>Password<input id="password" name="password" type="password" autocomplete="current-password" required></label>
          <div class="form-actions">
            <button type="submit" name="action" value="login">Sign in</button>
            <button type="submit" name="action" value="register" class="secondary">Create account</button>
          </div>
        </form>
      </section>
      <section id="workspace" hidden>
        <div class="workspace-bar">
          <div><p class="section-label">Active session</p><strong id="current-user"></strong></div>
          <button id="logout" class="secondary">Sign out</button>
        </div>

        <div class="workspace-grid">
          <section class="panel" aria-labelledby="resource-form-title">
            <div class="panel-heading">
              <p class="section-label">Write</p>
              <h2 id="resource-form-title">Create a resource</h2>
            </div>
            <form id="resource-form" class="stacked-form">
              <label>Title<input id="resource-title" name="title" maxlength="120" required></label>
              <label>Content<textarea id="resource-content" name="content" rows="7" maxlength="5000"></textarea></label>
              <div class="form-actions">
                <button id="resource-submit" type="submit">Save resource</button>
                <button id="cancel-edit" type="button" class="secondary" hidden>Cancel edit</button>
              </div>
            </form>
          </section>

          <section class="panel" aria-labelledby="resources-title">
            <div class="panel-heading panel-heading-row">
              <div><p class="section-label">Read</p><h2 id="resources-title">Your resources</h2></div>
              <button id="refresh-resources" class="secondary">Refresh</button>
            </div>
            <div id="resource-list" class="resource-list" aria-live="polite"></div>
          </section>
        </div>
      </section>
      </main>
    </div>
    <script src="/lab/catalog.js"></script>
    <script src="/lab/shell.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
